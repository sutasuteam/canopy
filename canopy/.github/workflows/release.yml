name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag for the release (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build binaries
        run: |
          make build/wallet
          make build/explorer
          mkdir -p dist
          GOARCH=amd64 CGO_ENABLED=0 GOOS=linux go build -a -o dist/cli-linux-amd64 ./cmd/main/...
          GOARCH=arm64 CGO_ENABLED=0 GOOS=linux go build -a -o dist/cli-linux-arm64 ./cmd/main/...

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/cli-linux-amd64
            dist/cli-linux-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-main:
    name: Docker - Main
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        run: |
          TAG=${{ github.event.inputs.tag }}
          DOCKER_TAG=${TAG//+/-}
          docker build \
            -t canopynetwork/canopy:${DOCKER_TAG} \
            -t canopynetwork/canopy:latest \
            --build-arg BRANCH=${TAG} \
            --build-arg BUILD_PATH=cmd/cli \
            ./.docker/auto-update/
          docker push canopynetwork/canopy:${DOCKER_TAG}
          docker push canopynetwork/canopy:latest

  docker-go:
    name: Docker - Go Plugin
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
