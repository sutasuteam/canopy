<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">
        <div class="card-body">
            <div class="card-top">
                <div class="card-owner">
                    <div class="card-avatar"></div>
                    <div class="card-user">
                        <span class="card-user-title">Owned By</span>
                        <span>2304RC</span>
                    </div>
                </div>
                <div class="card-creator">
                    <div class="card-avatar"></div>
                    <div class="card-user">
                        <span class="card-user-title">Created By</span>
                        <span>20AR02</span>
                    </div>
                </div>
            </div>
            <div class="card-image">
                <img src="NFT-marketplace.jpg" alt="">
            </div>
        </div>
        <div class="card-info">
            <p><b>Price</b> ETH 3.00</p>
            <p>$3,555.56</p>
        </div>
        <div class="card-footer">
            <span class="card-btn history">View History</span>
            <span class="card-btn buy">Buy Now</span>
        </div>

    </div>
</body>

</html>
